<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Icons</title>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const sizes = [16, 48, 128];
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    sizes.forEach(size => {
      canvas.width = size;
      canvas.height = size;
      
      // Blue background
      ctx.fillStyle = '#4285F4';
      const radius = size * 0.1875; // 24/128 ratio
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fill();
      
      // White circle outline
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size * 0.03125; // 4/128 ratio
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.25, 0, 2 * Math.PI);
      ctx.stroke();
      
      // Center dot
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.0625, 0, 2 * Math.PI);
      ctx.fill();
      
      // Clock hand
      ctx.fillRect(size/2 - size * 0.015625, size * 0.34375, size * 0.03125, size * 0.125);
      
      // Download
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
    
    document.body.innerHTML += '<p>Icons generated! Check your downloads folder.</p>';
  </script>
</body>
</html>
